<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" width="1280" height="640">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1b4b"/>
      <stop offset="50%" style="stop-color:#312e81"/>
      <stop offset="100%" style="stop-color:#1e1b4b"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <linearGradient id="nodeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a5b4fc"/>
      <stop offset="100%" style="stop-color:#c4b5fd"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="url(#bgGrad)"/>

  <!-- Subtle grid -->
  <g opacity="0.06" stroke="#818cf8" stroke-width="1">
    <line x1="0" y1="80" x2="1280" y2="80"/><line x1="0" y1="160" x2="1280" y2="160"/>
    <line x1="0" y1="240" x2="1280" y2="240"/><line x1="0" y1="320" x2="1280" y2="320"/>
    <line x1="0" y1="400" x2="1280" y2="400"/><line x1="0" y1="480" x2="1280" y2="480"/>
    <line x1="0" y1="560" x2="1280" y2="560"/>
    <line x1="80" y1="0" x2="80" y2="640"/><line x1="160" y1="0" x2="160" y2="640"/>
    <line x1="240" y1="0" x2="240" y2="640"/><line x1="320" y1="0" x2="320" y2="640"/>
    <line x1="400" y1="0" x2="400" y2="640"/><line x1="480" y1="0" x2="480" y2="640"/>
    <line x1="560" y1="0" x2="560" y2="640"/><line x1="640" y1="0" x2="640" y2="640"/>
    <line x1="720" y1="0" x2="720" y2="640"/><line x1="800" y1="0" x2="800" y2="640"/>
    <line x1="880" y1="0" x2="880" y2="640"/><line x1="960" y1="0" x2="960" y2="640"/>
    <line x1="1040" y1="0" x2="1040" y2="640"/><line x1="1120" y1="0" x2="1120" y2="640"/>
    <line x1="1200" y1="0" x2="1200" y2="640"/>
  </g>

  <!-- Decorative architecture diagram nodes - left side -->
  <g opacity="0.15">
    <!-- Container boxes -->
    <rect x="80" y="120" width="140" height="70" rx="8" fill="none" stroke="#818cf8" stroke-width="2"/>
    <rect x="80" y="280" width="140" height="70" rx="8" fill="none" stroke="#818cf8" stroke-width="2"/>
    <rect x="80" y="440" width="140" height="70" rx="8" fill="none" stroke="#818cf8" stroke-width="2"/>
    <!-- Connection lines -->
    <line x1="150" y1="190" x2="150" y2="280" stroke="#6366f1" stroke-width="1.5" stroke-dasharray="6,4"/>
    <line x1="150" y1="350" x2="150" y2="440" stroke="#6366f1" stroke-width="1.5" stroke-dasharray="6,4"/>
    <line x1="220" y1="155" x2="320" y2="155" stroke="#6366f1" stroke-width="1.5" stroke-dasharray="6,4"/>
    <line x1="220" y1="315" x2="320" y2="315" stroke="#6366f1" stroke-width="1.5" stroke-dasharray="6,4"/>
  </g>

  <!-- Decorative architecture diagram nodes - right side -->
  <g opacity="0.15">
    <rect x="1060" y="140" width="140" height="70" rx="8" fill="none" stroke="#818cf8" stroke-width="2"/>
    <rect x="1060" y="300" width="140" height="70" rx="8" fill="none" stroke="#818cf8" stroke-width="2"/>
    <rect x="1060" y="460" width="140" height="70" rx="8" fill="none" stroke="#818cf8" stroke-width="2"/>
    <line x1="1130" y1="210" x2="1130" y2="300" stroke="#6366f1" stroke-width="1.5" stroke-dasharray="6,4"/>
    <line x1="1130" y1="370" x2="1130" y2="460" stroke="#6366f1" stroke-width="1.5" stroke-dasharray="6,4"/>
    <line x1="960" y1="175" x2="1060" y2="175" stroke="#6366f1" stroke-width="1.5" stroke-dasharray="6,4"/>
    <line x1="960" y1="335" x2="1060" y2="335" stroke="#6366f1" stroke-width="1.5" stroke-dasharray="6,4"/>
  </g>

  <!-- Floating nodes scattered -->
  <g opacity="0.2">
    <circle cx="320" cy="160" r="6" fill="#a5b4fc"/>
    <circle cx="360" cy="200" r="4" fill="#c4b5fd"/>
    <circle cx="280" cy="480" r="5" fill="#818cf8"/>
    <circle cx="960" cy="180" r="5" fill="#a5b4fc"/>
    <circle cx="920" cy="480" r="6" fill="#c4b5fd"/>
    <circle cx="1000" cy="440" r="4" fill="#818cf8"/>
    <line x1="320" y1="160" x2="360" y2="200" stroke="#a5b4fc" stroke-width="1" opacity="0.5"/>
    <line x1="960" y1="180" x2="920" y2="480" stroke="#a5b4fc" stroke-width="1" opacity="0.3"/>
  </g>

  <!-- Center logo -->
  <g transform="translate(580, 160)">
    <rect width="120" height="120" rx="24" fill="url(#accentGrad)"/>
    <rect x="20" y="50" width="36" height="24" rx="4" fill="none" stroke="url(#nodeGrad)" stroke-width="2.5" opacity="0.7"/>
    <rect x="32" y="38" width="36" height="24" rx="4" fill="none" stroke="url(#nodeGrad)" stroke-width="2.5" opacity="0.85"/>
    <rect x="44" y="26" width="36" height="24" rx="4" fill="none" stroke="#fff" stroke-width="2.5"/>
    <line x1="56" y1="50" x2="44" y2="62" stroke="url(#nodeGrad)" stroke-width="2" opacity="0.6"/>
    <line x1="68" y1="38" x2="56" y2="50" stroke="url(#nodeGrad)" stroke-width="2" opacity="0.8"/>
    <circle cx="76" cy="78" r="16" fill="none" stroke="#fff" stroke-width="3"/>
    <line x1="87" y1="89" x2="98" y2="100" stroke="#fff" stroke-width="4" stroke-linecap="round"/>
    <circle cx="70" cy="75" r="3" fill="#a5b4fc"/>
    <circle cx="82" cy="75" r="3" fill="#c4b5fd"/>
    <circle cx="76" cy="84" r="3" fill="#e0e7ff"/>
    <line x1="70" y1="75" x2="82" y2="75" stroke="#a5b4fc" stroke-width="1.5" opacity="0.7"/>
    <line x1="70" y1="75" x2="76" y2="84" stroke="#a5b4fc" stroke-width="1.5" opacity="0.7"/>
    <line x1="82" y1="75" x2="76" y2="84" stroke="#c4b5fd" stroke-width="1.5" opacity="0.7"/>
  </g>

  <!-- Title text -->
  <text x="640" y="348" text-anchor="middle" font-family="'Inter', 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif" font-size="82" font-weight="800" fill="#ffffff" letter-spacing="-4">synopsis</text>

  <!-- Divider line between title and tagline -->
  <rect x="590" y="368" width="100" height="2.5" rx="1.25" fill="url(#accentGrad)" opacity="0.6"/>

  <!-- Tagline -->
  <text x="640" y="408" text-anchor="middle" font-family="'Inter', 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif" font-size="21" font-weight="500" fill="#c7d2fe" letter-spacing="0.5">C4 Architecture Diagrams from Code</text>

  <!-- Subtitle pill -->
  <rect x="570" y="432" width="140" height="32" rx="16" fill="#6366f1" opacity="0.2" stroke="#6366f1" stroke-width="1" stroke-opacity="0.3"/>
  <text x="640" y="454" text-anchor="middle" font-family="'SF Mono', 'Fira Code', 'JetBrains Mono', monospace" font-size="13" font-weight="500" fill="#a5b4fc" letter-spacing="2.5">AGENTIC SKILL</text>
</svg>
