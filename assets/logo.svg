<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a5b4fc"/>
      <stop offset="100%" style="stop-color:#c4b5fd"/>
    </linearGradient>
  </defs>
  <rect width="120" height="120" rx="24" fill="url(#bg)"/>
  <!-- C4 diagram icon: three layered boxes -->
  <rect x="20" y="50" width="36" height="24" rx="4" fill="none" stroke="url(#accent)" stroke-width="2.5" opacity="0.7"/>
  <rect x="32" y="38" width="36" height="24" rx="4" fill="none" stroke="url(#accent)" stroke-width="2.5" opacity="0.85"/>
  <rect x="44" y="26" width="36" height="24" rx="4" fill="none" stroke="#fff" stroke-width="2.5"/>
  <!-- Connection lines -->
  <line x1="56" y1="50" x2="44" y2="62" stroke="url(#accent)" stroke-width="2" opacity="0.6"/>
  <line x1="68" y1="38" x2="56" y2="50" stroke="url(#accent)" stroke-width="2" opacity="0.8"/>
  <!-- Magnifying glass -->
  <circle cx="76" cy="78" r="16" fill="none" stroke="#fff" stroke-width="3"/>
  <line x1="87" y1="89" x2="98" y2="100" stroke="#fff" stroke-width="4" stroke-linecap="round"/>
  <!-- Small nodes inside magnifier -->
  <circle cx="70" cy="75" r="3" fill="#a5b4fc"/>
  <circle cx="82" cy="75" r="3" fill="#c4b5fd"/>
  <circle cx="76" cy="84" r="3" fill="#e0e7ff"/>
  <line x1="70" y1="75" x2="82" y2="75" stroke="#a5b4fc" stroke-width="1.5" opacity="0.7"/>
  <line x1="70" y1="75" x2="76" y2="84" stroke="#a5b4fc" stroke-width="1.5" opacity="0.7"/>
  <line x1="82" y1="75" x2="76" y2="84" stroke="#c4b5fd" stroke-width="1.5" opacity="0.7"/>
</svg>
